<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鸡兔同笼大冒险</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @keyframes fadeIn { from { opacity: 0; transform: translateX(30px);} to { opacity: 1; transform: translateX(0);} }
  @keyframes scaleIn { from { transform: scale(0);} to { transform: scale(1);} }
  @keyframes spinIn { from { transform: scale(0) rotate(-180deg);} to { transform: scale(1) rotate(0);} }
  @keyframes slideDown { from { opacity: 0; max-height: 0;} to { opacity: 1; max-height: 500px;} }
  .stage-enter { animation: fadeIn 0.3s ease-out; }
  .scale-in { animation: scaleIn 0.4s cubic-bezier(.5,1.5,.5,1); }
  .spin-in { animation: spinIn 0.6s cubic-bezier(.5,1.5,.5,1); }
  .slide-down { animation: slideDown 0.3s ease-out; overflow: hidden; }
  .leg, .wheel { transition: transform 0.4s cubic-bezier(.5,1.5,.5,1), opacity 0.4s; transform-origin: top center; }
  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  .hidden-stage { display: none; }
</style>
</head>
<body>
<div class="min-h-screen bg-gradient-to-br from-orange-50 via-amber-50 to-yellow-50 p-4">
  <div class="max-w-2xl mx-auto">
    <div id="progress" class="mb-4 hidden">
      <div class="flex justify-between text-xs text-amber-700 mb-1">
        <span id="progressText"></span>
        <span id="progressName"></span>
      </div>
      <div class="h-2 bg-amber-100 rounded-full overflow-hidden">
        <div id="progressBar" class="h-full bg-gradient-to-r from-amber-400 to-orange-400 transition-all duration-500" style="width:0%"></div>
      </div>
    </div>
    <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8">
      <div id="stageContainer"></div>
    </div>
  </div>
</div>

<script>
// ============ Icon SVGs ============
const ICONS = {
  lightbulb: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>',
  check: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  x: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  sparkles: '<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5z"/></svg>',
  star: '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="#facc15" stroke="#facc15" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>',
  rotate: '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>'
};

// ============ State ============
const state = {
  stage: 0,
  totalStages: 10,
  // Stage 1
  s1_idx: 0, s1_h: '', s1_f: '', s1_fb: null,
  s1_rounds: [{c:1,r:0},{c:0,r:1},{c:2,r:0},{c:1,r:1},{c:2,r:1}],
  // Stage 2
  s2_k: 0,
  // Stage 3
  s3_k: 0, s3_revealed: false, s3_guess: '', s3_fb: null,
  s3_animals: [{type:'chicken'},{type:'rabbit'},{type:'chicken'},{type:'rabbit'},{type:'chicken'}],
  // Stage 4
  s4_c: 5,
  // Stage 5
  s5_c: '', s5_r: '', s5_hint: false, s5_fb: null,
  // Stage 6
  s6_b: '', s6_c: '', s6_hint: false, s6_fb: null,
  // Stage 7
  s7_t: '', s7_c: '', s7_hint: false, s7_fb: null, s7_assume: null,
  // Stage 8
  s8_t: '', s8_c: '', s8_step: 0, s8_fb: null,
  // Stage 9
  s9_c: '', s9_r: '', s9_fb: null, s9_tries: 0, s9_locked: false,
};

const STAGE_NAMES = ['开始','数数','抬腿','侦探','滑动','列式','停车场','三轮挑战','三种组合','终极','胜利'];

// ============ Helpers ============
function setState(updates) {
  Object.assign(state, updates);
  render();
}

function next() {
  state.stage = Math.min(state.stage + 1, state.totalStages);
  render();
}

function restart() {
  // Reset all
  Object.assign(state, {
    stage: 0,
    s1_idx: 0, s1_h: '', s1_f: '', s1_fb: null,
    s2_k: 0,
    s3_k: 0, s3_revealed: false, s3_guess: '', s3_fb: null,
    s4_c: 5,
    s5_c: '', s5_r: '', s5_hint: false, s5_fb: null,
    s6_b: '', s6_c: '', s6_hint: false, s6_fb: null,
    s7_t: '', s7_c: '', s7_hint: false, s7_fb: null, s7_assume: null,
    s8_t: '', s8_c: '', s8_step: 0, s8_fb: null,
    s9_c: '', s9_r: '', s9_fb: null, s9_tries: 0, s9_locked: false,
  });
  render();
}

// Animal/Vehicle renderers
function animalHTML(type, liftedLegs = 0, abstract = false) {
  const totalLegs = type === 'chicken' ? 2 : 4;
  const head = abstract
    ? '<div class="w-9 h-9 rounded-full bg-gradient-to-br from-slate-300 to-slate-500 border-2 border-slate-600 shadow-inner flex items-center justify-center"><div class="w-2 h-2 rounded-full bg-slate-700"></div></div>'
    : `<span class="text-4xl select-none">${type === 'chicken' ? '🐔' : '🐰'}</span>`;
  let legs = '';
  for (let i = 0; i < totalLegs; i++) {
    const lifted = i < liftedLegs;
    const style = lifted
      ? 'transform: translateY(-10px) rotate(-55deg); opacity: 0.2;'
      : 'transform: translateY(0) rotate(0); opacity: 1;';
    legs += `<div class="leg w-1 h-4 bg-orange-900 rounded-full" style="${style}"></div>`;
  }
  return `<div class="flex flex-col items-center mx-1">
    <div class="leading-none flex items-center justify-center h-10">${head}</div>
    <div class="flex gap-0.5 mt-0.5">${legs}</div>
  </div>`;
}

function vehicleHTML(type, raisedWheels = 0) {
  const config = { bike: {icon:'🚲', wheels:2}, tri: {icon:'🛺', wheels:3}, car: {icon:'🚗', wheels:4} }[type];
  let wheels = '';
  for (let i = 0; i < config.wheels; i++) {
    const raised = i < raisedWheels;
    const style = raised ? 'transform: translateY(-10px); opacity: 0.2;' : 'transform: translateY(0); opacity: 1;';
    wheels += `<div class="wheel w-2 h-2 rounded-full bg-gray-700 border border-gray-900" style="${style}"></div>`;
  }
  return `<div class="flex flex-col items-center mx-1">
    <span class="text-4xl leading-none select-none">${config.icon}</span>
    <div class="flex gap-0.5 mt-0.5">${wheels}</div>
  </div>`;
}

function repeat(n, fn) {
  let s = '';
  for (let i = 0; i < n; i++) s += fn(i);
  return s;
}

// ============ Stages ============
function stage0() {
  return `<div class="text-center space-y-5">
    <div class="text-6xl scale-in">🐔🐰</div>
    <h1 class="text-3xl font-bold text-amber-900">鸡兔同笼大冒险</h1>
    <div class="bg-amber-50 rounded-2xl p-5 border-2 border-amber-200 text-left text-amber-900 space-y-2">
      <p class="text-base">📜 古代中国《孙子算经》中记载了一道千古奇题：</p>
      <p class="text-base italic font-medium">"今有雉兔同笼，上有三十五头，下有九十四足，问雉兔各几何？"</p>
      <p class="text-sm text-amber-700">笼子里有鸡和兔，从上数有 35 个头，从下数有 94 只脚，问鸡和兔各有多少只？</p>
    </div>
    <p class="text-amber-800 text-sm">通关后，你还能用同样的思路解开停车场、自行车棚的奥秘！</p>
    <button onclick="next()" class="px-8 py-3 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-full shadow-lg">开始冒险 →</button>
  </div>`;
}

function stage1() {
  const r = state.s1_rounds[state.s1_idx];
  const heads = r.c + r.r;
  const feet = r.c * 2 + r.r * 4;
  const dots = state.s1_rounds.map((_, i) =>
    `<div class="w-2 h-2 rounded-full ${i <= state.s1_idx ? 'bg-amber-500' : 'bg-amber-200'}"></div>`
  ).join('');

  let fbHTML = '';
  if (state.s1_fb === 'correct') fbHTML = `<div class="text-center text-green-600 font-bold flex items-center justify-center gap-2 stage-enter">${ICONS.check}正确！</div>`;
  else if (state.s1_fb === 'wrong') fbHTML = `<div class="text-center text-red-500 font-bold flex items-center justify-center gap-2 stage-enter">${ICONS.x}再仔细数数～</div>`;

  return `<div class="space-y-5">
    <h2 class="text-2xl font-bold text-amber-900 text-center">第一关 · 数一数</h2>
    <p class="text-center text-amber-700 text-sm">观察图中：有几个头？有几只脚？</p>
    <div class="bg-green-50 rounded-2xl p-6 border-2 border-green-200 min-h-32 flex items-center justify-center flex-wrap gap-2">
      ${repeat(r.c, () => animalHTML('chicken'))}
      ${repeat(r.r, () => animalHTML('rabbit'))}
    </div>
    <div class="flex justify-center gap-3 items-end flex-wrap">
      <div class="flex flex-col items-center">
        <label class="text-sm text-amber-700 mb-1">头数</label>
        <input value="${state.s1_h}" oninput="state.s1_h=this.value" class="w-20 text-center text-xl border-2 border-amber-300 rounded-lg p-2" type="number">
      </div>
      <div class="flex flex-col items-center">
        <label class="text-sm text-amber-700 mb-1">脚数</label>
        <input value="${state.s1_f}" oninput="state.s1_f=this.value" class="w-20 text-center text-xl border-2 border-amber-300 rounded-lg p-2" type="number">
      </div>
      <button onclick="checkS1(${heads}, ${feet})" class="px-6 py-2 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-lg">检查</button>
    </div>
    ${fbHTML}
    <div class="flex justify-center gap-1">${dots}</div>
  </div>`;
}

function checkS1(heads, feet) {
  if (parseInt(state.s1_h) === heads && parseInt(state.s1_f) === feet) {
    state.s1_fb = 'correct';
    render();
    setTimeout(() => {
      if (state.s1_idx === state.s1_rounds.length - 1) next();
      else { state.s1_idx++; state.s1_h = ''; state.s1_f = ''; state.s1_fb = null; render(); }
    }, 1100);
  } else {
    state.s1_fb = 'wrong';
    render();
    setTimeout(() => { state.s1_fb = null; render(); }, 1400);
  }
}

function stage2() {
  const k = state.s2_k;
  const chickens = 3, rabbits = 2;
  const totalHeads = chickens + rabbits;
  const totalFeet = chickens * 2 + rabbits * 4;
  const lifted = chickens * Math.min(k, 2) + rabbits * Math.min(k, 4);
  const remaining = totalFeet - lifted;
  const insight = k === 2
    ? `<div class="bg-yellow-100 border-2 border-yellow-400 rounded-xl p-4 flex gap-3 stage-enter">
         <div class="text-yellow-600 flex-shrink-0">${ICONS.lightbulb}</div>
         <p class="text-yellow-900 text-sm">🎉 神奇！每只鸡都"坐下"了（0 条腿），每只兔子还剩 2 条。地上剩余腿数 = <strong>2 × 兔子数</strong>！</p>
       </div>` : '';

  return `<div class="space-y-4">
    <h2 class="text-2xl font-bold text-amber-900 text-center">第二关 · 抬腿魔法</h2>
    <p class="text-center text-amber-700 text-sm">让所有动物同时抬起 <strong>K</strong> 条腿，看看会发生什么？</p>
    <div class="bg-green-50 rounded-2xl p-5 border-2 border-green-200">
      <div class="flex justify-center flex-wrap gap-2 mb-4 min-h-20">
        ${repeat(chickens, () => animalHTML('chicken', Math.min(k, 2)))}
        ${repeat(rabbits, () => animalHTML('rabbit', Math.min(k, 4)))}
      </div>
      <div class="flex justify-around text-center text-sm flex-wrap gap-2">
        <div class="bg-white rounded-lg px-3 py-2 shadow"><div class="text-xs text-gray-500">头</div><div class="text-lg font-bold text-amber-700">${totalHeads}</div></div>
        <div class="bg-white rounded-lg px-3 py-2 shadow"><div class="text-xs text-gray-500">原脚</div><div class="text-lg font-bold text-amber-700">${totalFeet}</div></div>
        <div class="bg-white rounded-lg px-3 py-2 shadow"><div class="text-xs text-gray-500">抬起</div><div class="text-lg font-bold text-blue-600">${lifted}</div></div>
        <div class="bg-white rounded-lg px-3 py-2 shadow"><div class="text-xs text-gray-500">地上剩</div><div class="text-lg font-bold text-green-600">${remaining}</div></div>
      </div>
    </div>
    <div class="px-2">
      <label class="text-sm text-amber-700 flex justify-between mb-1">
        <span>每只动物抬起 K = <strong>${k}</strong> 条腿</span>
      </label>
      <input type="range" min="0" max="4" step="1" value="${k}" oninput="setState({s2_k: Number(this.value)})" class="w-full accent-amber-500">
    </div>
    ${insight}
    <div class="text-center">
      <button onclick="next()" ${k !== 2 ? 'disabled' : ''} class="px-8 py-3 bg-amber-500 hover:bg-amber-600 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-bold rounded-full shadow">
        ${k === 2 ? '我懂了，下一关 →' : '试试 K=2 看看魔法'}
      </button>
    </div>
  </div>`;
}

function stage3() {
  const k = state.s3_k;
  const animals = state.s3_animals;
  const totalHeads = 5;
  const totalFeet = 14;
  const lifted = animals.reduce((s, a) => s + Math.min(k, a.type === 'chicken' ? 2 : 4), 0);
  const remaining = totalFeet - lifted;

  let insight = '';
  if (k === 2 && !state.s3_revealed) {
    insight = `<div class="bg-yellow-100 border-2 border-yellow-400 rounded-xl p-3 text-yellow-900 text-sm stage-enter">
      💡 地上剩 ${remaining} 只脚，只有兔子还站着（每只剩 2 条腿）→ 兔子数 = ${remaining} ÷ 2
    </div>`;
  }
  let fb = '';
  if (state.s3_fb === 'correct') fb = `<div class="text-center text-green-600 font-bold">✅ 正确！揭开真相...</div>`;
  else if (state.s3_fb === 'wrong') fb = `<div class="text-center text-red-500 font-bold">❌ 试试 K=2 的魔法</div>`;

  return `<div class="space-y-4">
    <h2 class="text-2xl font-bold text-amber-900 text-center">第三关 · 隐身侦探</h2>
    <p class="text-center text-amber-700 text-sm">动物身份被遮住了，看不出哪只是鸡哪只是兔！<br>已知：<strong>5 个头, 14 只脚</strong>，用抬腿魔法找出兔子数量。</p>
    <div class="bg-slate-100 rounded-2xl p-5 border-2 border-slate-300">
      <div class="flex justify-center flex-wrap gap-3 mb-4 min-h-24 items-end">
        ${animals.map(a => animalHTML(a.type, Math.min(k, a.type === 'chicken' ? 2 : 4), !state.s3_revealed)).join('')}
      </div>
      <div class="flex justify-around text-center text-sm flex-wrap gap-2">
        <div class="bg-white rounded-lg px-3 py-2 shadow"><div class="text-xs text-gray-500">头</div><div class="text-lg font-bold">${totalHeads}</div></div>
        <div class="bg-white rounded-lg px-3 py-2 shadow"><div class="text-xs text-gray-500">原脚</div><div class="text-lg font-bold">${totalFeet}</div></div>
        <div class="bg-white rounded-lg px-3 py-2 shadow"><div class="text-xs text-gray-500">抬起</div><div class="text-lg font-bold text-blue-600">${lifted}</div></div>
        <div class="bg-white rounded-lg px-3 py-2 shadow"><div class="text-xs text-gray-500">地上剩</div><div class="text-lg font-bold text-green-600">${remaining}</div></div>
      </div>
    </div>
    <div class="px-2">
      <label class="text-sm text-amber-700">每只抬起 K = <strong>${k}</strong> 条腿</label>
      <input type="range" min="0" max="2" step="1" value="${k}" oninput="setState({s3_k: Number(this.value)})" class="w-full accent-amber-500">
    </div>
    ${insight}
    <div class="flex justify-center items-center gap-3 flex-wrap">
      <label class="text-amber-700">兔子有几只？</label>
      <input type="number" value="${state.s3_guess}" oninput="state.s3_guess=this.value" class="w-20 text-center text-xl border-2 border-amber-300 rounded-lg p-2">
      <button onclick="checkS3()" class="px-5 py-2 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-lg">提交</button>
    </div>
    ${fb}
  </div>`;
}

function checkS3() {
  if (parseInt(state.s3_guess) === 2) {
    state.s3_fb = 'correct';
    state.s3_revealed = true;
    render();
    setTimeout(() => next(), 2400);
  } else {
    state.s3_fb = 'wrong';
    render();
    setTimeout(() => { state.s3_fb = null; render(); }, 1500);
  }
}

function stage4() {
  const targetH = 10, targetF = 28;
  const c = state.s4_c;
  const r = targetH - c;
  const curF = c * 2 + r * 4;
  const match = curF === targetF;

  return `<div class="space-y-4">
    <h2 class="text-2xl font-bold text-amber-900 text-center">第四关 · 滑动调整</h2>
    <p class="text-center text-amber-700 text-sm">题目：共有 <strong>10 个头, 28 只脚</strong>。<br>拖动滑块让脚数正好等于 28！</p>
    <div class="bg-green-50 rounded-2xl p-4 border-2 border-green-200 min-h-32">
      <div class="flex justify-center flex-wrap gap-1">
        ${repeat(c, () => animalHTML('chicken'))}
        ${repeat(r, () => animalHTML('rabbit'))}
      </div>
    </div>
    <div class="px-2">
      <label class="text-sm text-amber-700 flex justify-between mb-1">
        <span>🐔 鸡：<strong>${c}</strong></span>
        <span>🐰 兔：<strong>${r}</strong></span>
      </label>
      <input type="range" min="0" max="${targetH}" value="${c}" oninput="setState({s4_c: Number(this.value)})" class="w-full accent-amber-500">
    </div>
    <div class="flex justify-center gap-3 flex-wrap">
      <div class="rounded-lg px-4 py-2 shadow transition-colors ${match ? 'bg-green-200' : 'bg-white'}">
        <div class="text-xs text-gray-500">当前脚数</div>
        <div class="text-2xl font-bold">${curF}</div>
      </div>
      <div class="rounded-lg px-4 py-2 bg-amber-100 shadow">
        <div class="text-xs text-gray-500">目标脚数</div>
        <div class="text-2xl font-bold">${targetF}</div>
      </div>
    </div>
    ${match
      ? `<div class="text-center space-y-2 scale-in">
           <div class="text-2xl">🎉 完美匹配！</div>
           <p class="text-amber-800 text-sm">${c} 只鸡 + ${r} 只兔 = ${targetH} 头, ${targetF} 脚</p>
           <button onclick="next()" class="px-8 py-3 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-full shadow">下一关 →</button>
         </div>`
      : `<p class="text-center text-amber-600 text-sm">${curF < targetF ? '↗️ 脚不够，多加点兔子？' : '↘️ 脚太多，多加点鸡？'}</p>`
    }
  </div>`;
}

function stage5() {
  const heads = 20, feet = 56;
  let fb = '';
  if (state.s5_fb === 'correct') fb = `<div class="text-center text-green-600 font-bold">✅ 太棒了！</div>`;
  else if (state.s5_fb === 'wrong') fb = `<div class="text-center text-red-500 font-bold">❌ 再想想，可以打开提示</div>`;

  const hintHTML = state.s5_hint ? `<div class="bg-yellow-50 border-2 border-yellow-300 rounded-xl p-4 text-sm text-yellow-900 space-y-1 slide-down">
    <p><strong>抬腿法：</strong>每只动物抬起 2 条腿。</p>
    <p>抬起总脚数 = 2 × ${heads} = ${2 * heads}</p>
    <p>地上剩余 = ${feet} − ${2 * heads} = <strong>${feet - 2 * heads}</strong></p>
    <p>剩下都是兔子的腿（每只兔子还剩 2 条）→ 兔子数 = ${feet - 2 * heads} ÷ 2 = <strong>${(feet - 2 * heads) / 2}</strong></p>
    <p>鸡数 = ${heads} − 兔子数</p>
  </div>` : '';

  return `<div class="space-y-4">
    <h2 class="text-2xl font-bold text-amber-900 text-center">第五关 · 列式破题</h2>
    <p class="text-center text-amber-700">题目：共有 <strong>20 个头, 56 只脚</strong>。鸡和兔各几只？</p>

// ============ Render ============
function render() {
  // Preserve focus state for inputs
  const active = document.activeElement;
  const activeInfo = active && active.tagName === 'INPUT' ? {
    type: active.type,
    selStart: active.selectionStart,
    selEnd: active.selectionEnd,
    value: active.value,
    // We use position-based key: tag + type + index
    onInputAttr: active.getAttribute('oninput')
  } : null;

  // Progress bar
  const progressEl = document.getElementById('progress');
  if (state.stage > 0 && state.stage < state.totalStages) {
    progressEl.classList.remove('hidden');
    document.getElementById('progressText').textContent = `关卡 ${state.stage} / ${state.totalStages - 1}`;
    document.getElementById('progressName').textContent = STAGE_NAMES[state.stage];
    document.getElementById('progressBar').style.width = `${(state.stage / (state.totalStages - 1)) * 100}%`;
  } else {
    progressEl.classList.add('hidden');
  }

  const container = document.getElementById('stageContainer');
  const stages = [stage0, stage1, stage2, stage3, stage4, stage5, stage6, stage7, stage8, stage9, stage10];
  container.innerHTML = `<div class="stage-enter" key="${state.stage}">${stages[state.stage]()}</div>`;

  // Restore focus
  if (activeInfo) {
    const inputs = container.querySelectorAll('input');
    for (const inp of inputs) {
      if (inp.getAttribute('oninput') === activeInfo.onInputAttr) {
        inp.focus();
        try {
          if (activeInfo.selStart !== null && inp.type !== 'range') {
            inp.setSelectionRange(activeInfo.selStart, activeInfo.selEnd);
          }
        } catch(e) {}
        break;
      }
    }
  }
}

render();
